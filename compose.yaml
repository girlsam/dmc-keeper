services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dmc}
      POSTGRES_USER: ${POSTGRES_USER:-dmc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dmc}
    ports:
      - "5432:5432"
    volumes:
      - dmc-pgdata:/var/lib/postgresql/data

volumes:
  dmc-pgdata:
