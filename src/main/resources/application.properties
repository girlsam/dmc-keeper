spring.application.name=dmc-keeper

# --- Database connection (matches compose.yaml) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:dmc}
spring.datasource.username=${POSTGRES_USER:dmc}
spring.datasource.password=${POSTGRES_PASSWORD:dmc}

# --- JPA / Hibernate ---
# show-sql logs the SQL Hibernate runs (handy while learning)
spring.jpa.show-sql=true
# ddl-auto=update lets Hibernate create/alter tables from our @Entity classes.
# Fine for dev; we'll revisit before anything real.
spring.jpa.hibernate.ddl-auto=update
